<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a05a"/>
      <stop offset="50%" stop-color="#c48b4a"/>
      <stop offset="100%" stop-color="#8b5e3c"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d4a05a"/>
      <stop offset="40%" stop-color="#c48b4a"/>
      <stop offset="100%" stop-color="#7a4e2a"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c48b4a"/>
      <stop offset="30%" stop-color="#d4a05a"/>
      <stop offset="60%" stop-color="#8b5e3c"/>
      <stop offset="100%" stop-color="#c48b4a"/>
    </linearGradient>
    <radialGradient id="heatGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c48b4a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c48b4a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#1a1a1a" rx="4"/>

  <!-- Subtle outer glow behind badge -->
  <circle cx="155" cy="190" r="120" fill="url(#heatGlow)"/>

  <!-- Badge: outer ring -->
  <circle cx="155" cy="190" r="88" fill="none" stroke="url(#ringGrad)" stroke-width="1.2"/>
  <!-- Badge: secondary ring -->
  <circle cx="155" cy="190" r="84" fill="none" stroke="#c48b4a" stroke-width="0.5" opacity="0.4"/>
  <!-- Badge: inner ring -->
  <circle cx="155" cy="190" r="80" fill="none" stroke="#8b5e3c" stroke-width="0.5" opacity="0.3"/>
  <!-- Badge: dark face -->
  <circle cx="155" cy="190" r="79" fill="#141414"/>

  <!-- Decorative compass dots at 12, 3, 6, 9 -->
  <circle cx="155" cy="106" r="2.5" fill="#c48b4a" opacity="0.7"/>
  <circle cx="155" cy="274" r="2.5" fill="#c48b4a" opacity="0.7"/>
  <circle cx="71"  cy="190" r="2.5" fill="#c48b4a" opacity="0.7"/>
  <circle cx="239" cy="190" r="2.5" fill="#c48b4a" opacity="0.7"/>

  <!-- Decorative small ticks at diagonals -->
  <circle cx="194" cy="117" r="1.2" fill="#8b5e3c" opacity="0.5"/>
  <circle cx="116" cy="263" r="1.2" fill="#8b5e3c" opacity="0.5"/>
  <circle cx="116" cy="117" r="1.2" fill="#8b5e3c" opacity="0.5"/>
  <circle cx="194" cy="263" r="1.2" fill="#8b5e3c" opacity="0.5"/>

  <!-- Stylised geometric E mark (angular, faceted) -->
  <!-- Top bar of E -->
  <polygon points="125,152 185,152 185,158 140,158 140,174 178,174 178,180 140,180 140,196 185,196 185,202 125,202 125,152" fill="url(#flameGrad)" opacity="0.95"/>
  <!-- E left vertical stroke highlight -->
  <polygon points="125,152 140,158 140,196 125,202" fill="#d4a05a" opacity="0.3"/>

  <!-- Flame accent inside the E counter -->
  <polygon points="155,145 148,160 155,168 162,160" fill="#d4a05a" opacity="0.6"/>
  <polygon points="155,168 148,178 155,186 162,178" fill="#c48b4a" opacity="0.5"/>
  <polygon points="155,186 150,192 155,198 160,192" fill="#8b5e3c" opacity="0.4"/>

  <!-- Cedar grain lines behind the E -->
  <line x1="155" y1="148" x2="155" y2="216" stroke="#c48b4a" stroke-width="0.4" opacity="0.1"/>
  <line x1="140" y1="158" x2="140" y2="210" stroke="#c48b4a" stroke-width="0.3" opacity="0.08"/>
  <line x1="170" y1="158" x2="170" y2="210" stroke="#c48b4a" stroke-width="0.3" opacity="0.08"/>

  <!-- Vertical divider -->
  <line x1="270" y1="130" x2="270" y2="250" stroke="#c48b4a" stroke-width="0.6" opacity="0.25"/>

  <!-- TEXT: brand name — ENDURE -->
  <text x="285" y="215" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" letter-spacing="4" fill="#f5f0e8">ENDURE</text>

  <!-- Accent line -->
  <line x1="285" y1="234" x2="525" y2="234" stroke="#c48b4a" stroke-width="0.8" opacity="0.6"/>

  <!-- TEXT: tagline -->
  <text x="285" y="262" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="5" fill="#c48b4a">CUSTOM MADE LUXURY</text>
</svg>